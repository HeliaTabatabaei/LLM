

services:

  api:
    build: .
    container_name: adonis_chat
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant 
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: